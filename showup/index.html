<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../showup-icon.png" />
    <link rel="stylesheet" href="./style.css">
    <title>ShowUp - Build a consistent gym habit with your friends</title>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="../showup-icon.png" alt="ShowUp Logo">
            </div>
            <nav class="nav">
                <a href="./support/" class="nav-link">Support</a>
                <a href="./privacy/" class="nav-link">Privacy</a>
                <a href="https://apps.apple.com/de/app/showup-accountability-partner/id6756323037" class="cta-button">Download ShowUp</a>
            </nav>
        </div>
    </header>

    <main class="hero">
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title">Build a consistent gym habit with your friends</h1>
                <p class="hero-description">Check in when you're at the gym using location verification, and see when your friends do the same. Track your streaks, join challenges and stay accountable together.</p>
                <div class="download-section">
                    <a href="https://apps.apple.com/de/app/showup-accountability-partner/id6756323037" class="download-button">
                        Download on iOS
                    </a>
                    <p class="no-credit-card">No credit card required</p>
                </div>
            </div>
            <div class="hero-image">
                <img src="../Home-portrait.png" alt="ShowUp App Screenshot">
            </div>
        </div>
    </main>
</body>
</html>
